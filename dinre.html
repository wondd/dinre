<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b141a;
    color:white;
}

/* background animasi */
.bg{
    position:fixed;
    inset:0;
    background:linear-gradient(120deg,#0b141a,#111b21,#0b141a);
    background-size:200% 200%;
    animation:moveBg 8s ease infinite;
    z-index:-1;
}

@keyframes moveBg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* chat */
.chat{
    max-width:500px;
    margin:auto;
    padding:15px;
    height:100vh;
    overflow-y:auto;
    scroll-behavior:smooth;
    box-sizing:border-box;
}

/* narration */
.narration{
    text-align:center;
    margin:14px 0;
    font-size:12px;
    opacity:.7;
}

/* message */
.msg{
    display:flex;
    flex-direction:column;
    margin:10px 0;
}
.name{
    font-size:12px;
    color:#8696a0;
    margin:0 0 4px 0;
}

.right .name{
    align-self:flex-end;
    text-align:right;
}
.left .name{
    align-self:flex-start;
    text-align:left;
}
.left{
    align-items:flex-start;
}
.right{
    align-items:flex-end;
}

.bubble{
    display:block;
    width:fit-content;
    max-width:75%;
    padding:10px 13px;
    border-radius:12px;
    font-size:14px;
    line-height:1.4;
    word-break:break-word;
    white-space:pre-wrap;
}
.right .bubble{
    background:#005c4b;
    border-top-right-radius:4px;
}
.left .bubble{
    background:#202c33;
    border-top-left-radius:4px;
}

/* kursor ketik */
.cursor{
    border-right:2px solid white;
    animation:blink .6s infinite;
}
@keyframes blink{
    50%{border-color:transparent;}
}

/* lapisan ketuk */
.tap-layer{
    position:fixed;
    inset:0;
    z-index:10;
}

audio{display:none;}
</style>
</head>

let index = 0;
let waiting = false;
let musicStarted = false;
let otomatisBawah = true;

const chat = document.getElementById("chat");
const tap = document.getElementById("tap");
const bgm = document.getElementById("bgm");

chat.addEventListener("scroll", ()=>{
  const sisa = chat.scrollHeight - chat.scrollTop - chat.clientHeight;
  otomatisBawah = sisa < 50;
});

function autoScroll(){
  if(otomatisBawah) chat.scrollTop = chat.scrollHeight;
}

function vibrateFX(type){
  if(!navigator.vibrate) return;
  if(type==="start") navigator.vibrate([30,40,30]);
  if(type==="mid") navigator.vibrate(20);
  if(type==="end") navigator.vibrate([60,50,60]);
}

function startMusic(){
  if(!musicStarted){
    bgm.volume=0.5;
    bgm.play().catch(()=>{});
    musicStarted=true;
  }
}

function typeText(el,text,cb){
  let i=0;
  el.classList.add("cursor");
  vibrateFX("start");
  let interval=setInterval(()=>{
    el.textContent=text.substring(0,i);
    autoScroll();
    i++;
    if(i%2===0) vibrateFX("mid");
    if(i>text.length){
      clearInterval(interval);
      el.classList.remove("cursor");
      vibrateFX("end");
      otomatisBawah=true;
      cb();
    }
  },30);
}

function run(){
  if(index>=data.length) return;
  waiting=true;
  const item=data[index];
  if(item.type==="narration"){
    const n=document.createElement("div");
    n.className="narration";
    n.textContent=item.text;
    chat.appendChild(n);
    autoScroll();
    vibrateFX("start");
    index++; waiting=false; return;
  }
  const msg=document.createElement("div");
  msg.className="msg "+item.side;
  msg.innerHTML=`<div class="name">${item.name}</div><div class="bubble"></div>`;
  chat.appendChild(msg); autoScroll();
  const bubble=msg.querySelector(".bubble");
  typeText(bubble,item.text,()=>{waiting=false;});
  index++;
}

tap.addEventListener("click",()=>{
  startMusic();
  if(waiting) return;
  run();
});

run();
</script>
